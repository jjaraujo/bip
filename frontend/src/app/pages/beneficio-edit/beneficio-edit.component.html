  <div class="card">
    <div class="toolbar" style="justify-content: space-between; margin-bottom: 10px;">
      <h2 style="margin:0;">{{ isEdit() ? 'Editar' : 'Novo' }} benefício</h2>
      <a routerLink="/beneficios">Voltar</a>
    </div>

    <div *ngIf="error()" class="error" style="margin-bottom: 12px;">{{ error() }}</div>

    <form [formGroup]="form" (ngSubmit)="save()">
      <div class="row">
        <div>
          <label>Nome *</label>
          <input formControlName="nome" placeholder="Ex: Vale Alimentação" />
        </div>
        <div>
          <label>Valor (BRL) *</label>
          <input formControlName="valor" placeholder="Ex: 100.00" />
        </div>
      </div>

      <div style="margin-top: 12px;">
        <label>Descrição</label>
        <textarea formControlName="descricao" rows="3" placeholder="Opcional"></textarea>
      </div>

      <div class="toolbar" style="margin-top: 12px;">
        <label style="display:flex; gap:8px; align-items:center; margin:0;">
          <input type="checkbox" formControlName="ativo" />
          Ativo
        </label>
      </div>

      <div class="toolbar" style="margin-top: 14px; justify-content: flex-end;">
        <button type="button" (click)="cancel()">Cancelar</button>
        <button class="primary" type="submit" [disabled]="saving() || form.invalid">
          {{ saving() ? 'Salvando...' : 'Salvar' }}
        </button>
      </div>
    </form>
  </div>
